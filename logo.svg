<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1d4ed8"/>

  <!-- Cargo box body -->
  <rect x="10" y="22" width="36" height="26" rx="3" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="2"/>

  <!-- Box lid / top flap -->
  <path d="M10 25 L28 18 L46 25" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" fill="none"/>

  <!-- Vertical center line on box (panel divide) -->
  <line x1="28" y1="25" x2="28" y2="48" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Horizontal strap line on box -->
  <line x1="10" y1="36" x2="46" y2="36" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Import arrow: coming INTO the box from the right -->
  <line x1="54" y1="34" x2="42" y2="34" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="46,30 42,34 46,38" stroke="#4ade80" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
</svg>
